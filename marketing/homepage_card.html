<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1600px; height:1200px; overflow:hidden; }
  body {
    background: linear-gradient(160deg, #B9E6F8 0%, #CDF3E3 52%, #DDE7FA 100%);
    display:flex; align-items:center; justify-content:center; position:relative;
  }
  .postit {
    width:560px; height:390px; background:#FFFDF7; border-radius:44px;
    transform:rotate(-7deg); position:relative;
    box-shadow:0 34px 80px rgba(45,75,95,0.20);
  }
  .l1 { position:absolute; left:88px; top:118px; width:300px; height:30px; border-radius:16px; background:rgba(58,53,47,0.16); }
  .l2 { position:absolute; left:88px; top:196px; width:200px; height:30px; border-radius:16px; background:rgba(58,53,47,0.11); }
  .spark { position:absolute; color:#fff; text-shadow:0 0 34px rgba(255,255,255,0.95), 0 0 80px rgba(255,255,255,0.75); }
  .gspark { position:absolute; color:#8CFFB8; text-shadow:0 0 36px rgba(140,255,184,0.95), 0 0 84px rgba(140,255,184,0.75); }
</style>
</head>
<body>
  <div class="spark"  style="top:12%; left:16%;  font-size:82px;">✦</div>
  <div class="gspark" style="top:22%; right:17%; font-size:60px;">✦</div>
  <div class="spark"  style="top:8%;  right:32%; font-size:44px;">✧</div>
  <div class="gspark" style="bottom:18%; left:23%; font-size:64px;">✧</div>
  <div class="spark"  style="bottom:12%; right:20%; font-size:88px;">✦</div>
  <div class="spark"  style="bottom:30%; left:9%;  font-size:46px;">✧</div>
  <div class="gspark" style="top:46%;  right:8%;  font-size:38px;">✧</div>
  <div class="postit"><div class="l1"></div><div class="l2"></div></div>
</body>
</html>
